# Nginx proxy reverso para un cliente (SSL termination)
# Instalar certbot: sudo certbot --nginx -d rifas.clienteA.com

server {
    listen 80;
    server_name rifas.clienteA.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rifas.clienteA.com;

    ssl_certificate     /etc/letsencrypt/live/rifas.clienteA.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rifas.clienteA.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Frontend React
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API FastAPI (websocket-ready)
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Static assets cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
